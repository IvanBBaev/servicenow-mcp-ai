name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest]
        node: [20, 22, 24]
        include:
          # One macOS leg (the development platform) on the .nvmrc Node.
          - os: macos-latest
            node: 22
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run format:check
      - run: npm run build
      - run: npm test
      # Coverage gate — lines 93 / branches 80 / functions 96, a ratchet set
      # just below the real report (~95 / ~82 / ~99). Runs once on ubuntu/Node 22.
      - if: matrix.node == 22 && matrix.os == 'ubuntu-latest'
        run: npm run test:coverage
      # Upload the lcov report to Codecov (public repo). Non-blocking: a Codecov
      # outage must not fail CI. Runs once, on the same ubuntu/Node 22 leg.
      - if: matrix.node == 22 && matrix.os == 'ubuntu-latest'
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/lcov.info
          fail_ci_if_error: false
      # Production-dependency audit: fail on high+ advisories.
      - if: matrix.node == 22 && matrix.os == 'ubuntu-latest'
        run: npm audit --omit=dev --audit-level=high

  # Q2-3: Windows run (win32 path/line-ending safety). LF is enforced via
  # .gitattributes so the generated-docs drift tests stay byte-identical to
  # their LF originals on the Windows checkout.
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm test

  # S2-3: the bin launcher must print a human message (not a SyntaxError)
  # under ancient Node and exit non-zero.
  launcher-node12:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # No container: checkout runs under the runner's modern Node; setup-node
      # then installs the old runtime so only the launcher probe runs on it.
      # (A node:12 container cannot run the Node 20 that powers checkout@v4.)
      - uses: actions/setup-node@v4
        with:
          node-version: 12
      - run: |
          set +e
          out=$(node bin/servicenow-mcp-ai.cjs 2>&1)
          code=$?
          echo "$out"
          test $code -ne 0 || exit 1
          echo "$out" | grep -q "requires Node.js >= 20" || exit 1
