name: Publish

# Publish to npm from CI on a version tag (never from a laptop). The same
# `npm run check` gate runs here, and `prepublishOnly` runs it again as a
# backstop, so a red build cannot reach the registry.
on:
  push:
    tags: ["v*"]

permissions:
  contents: read
  id-token: write # npm provenance (OIDC)

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org"
          cache: npm
      - run: npm ci
      - name: Tag must match package.json version
        run: |
          tag="${GITHUB_REF_NAME#v}"
          pkg=$(node -p "require('./package.json').version")
          test "$tag" = "$pkg" || { echo "tag v$tag != package.json $pkg"; exit 1; }
      - run: npm run check
      - run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
